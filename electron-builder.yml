appId: com.lumina.reader
productName: Lumina Reader
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - node_modules/**/*
  - package.json
win:
  icon: build/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Lumina Reader
  artifactName: ${productName}-setup-${version}.${ext}
